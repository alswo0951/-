<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart WMS v2.0 | 통합 재고 동기화 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .active-tab { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- 상단 헤더 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-indigo-600 rounded-lg text-white">
          <i data-lucide="package-search" class="w-6 h-6"></i>
        </div>
        <div>
          <span class="text-lg font-bold text-slate-900">Smart WMS <span class="text-indigo-600">v2.0</span></span>
        </div>
      </div>
      
      <!-- 탭 메뉴 -->
      <nav class="flex space-x-8">
        <button onclick="switchTab('inventory')" id="tab-inventory-btn" class="py-5 px-1 text-sm font-bold transition active-tab">현재고 관리</button>
        <button onclick="switchTab('map')" id="tab-map-btn" class="py-5 px-1 text-sm font-bold text-slate-500 hover:text-slate-700 transition">로케이션 맵</button>
        <button onclick="switchTab('admin')" id="tab-admin-btn" class="py-5 px-1 text-sm font-bold text-slate-500 hover:text-slate-700 transition">마스터 관리</button>
      </nav>

      <div class="flex items-center space-x-4">
        <button onclick="syncAllData()" class="flex items-center space-x-1.5 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold transition shadow-sm">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          <span>로케이션 자동 동기화</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">

    <!-- TAB 1: 현재고 관리 페이지 -->
    <section id="tab-inventory" class="tab-content active">
      <div class="mb-6 flex justify-between items-end">
        <div>
          <h2 class="text-2xl font-bold text-slate-900">실재고 현황 등록</h2>
          <p class="text-sm text-slate-500 mt-1">현재 물류창고에 입고된 실재고 정보를 바코드와 다중 로케이션 단위로 관리합니다.</p>
        </div>
        <button onclick="addNewInventoryRow()" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg text-xs font-bold hover:bg-slate-50 transition flex items-center space-x-1">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>품목 추가</span>
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-48">바코드</th>
              <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider">품목명</th>
              <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-32">가용재고</th>
              <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider">다중 로케이션 (콤마 구분)</th>
              <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-24 text-right">관리</th>
            </tr>
          </thead>
          <tbody id="inventory-table-body" class="divide-y divide-slate-100">
            <!-- JS로 행이 생성됨 -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- TAB 2: 로케이션 맵 페이지 -->
    <section id="tab-map" class="tab-content">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-900">로케이션 시각화 맵</h2>
        <p class="text-sm text-slate-500 mt-1">현재고 정보를 바탕으로 동기화된 창고 내 물리적 적재 현황입니다.</p>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
          <p class="text-xs font-bold text-slate-400 mb-1">전체 가동률</p>
          <div class="flex items-end space-x-2">
            <span id="map-occupancy-rate" class="text-2xl font-bold">0%</span>
            <span class="text-xs text-slate-400 mb-1">/ 100%</span>
          </div>
        </div>
      </div>

      <div id="warehouse-map-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-10 gap-3">
        <!-- 로케이션 셀 렌더링 -->
      </div>
    </section>

    <!-- TAB 3: 마스터 관리 (로케이션 정보) -->
    <section id="tab-admin" class="tab-content">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-900">로케이션 마스터</h2>
        <p class="text-sm text-slate-500 mt-1">창고 로케이션의 기본 속성과 관리 기준을 정의합니다.</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" id="location-master-container">
        <!-- 로케이션 마스터 테이블 -->
      </div>
    </section>

  </main>

  <script>
    // 1. 초기 데이터 구조
    const initialInventory = [
      { barcode: "8801234567", name: "A등급 고회전 박스", qty: 250, locations: "1B-01-01, 1B-01-02" },
      { barcode: "8809876543", name: "B등급 전자제품", qty: 120, locations: "1C-02-01" }
    ];

    const initialLocations = [
      { id: "1B-01-01", zone: "A", currentProduct: "-", currentQty: 0 },
      { id: "1B-01-02", zone: "A", currentProduct: "-", currentQty: 0 },
      { id: "1B-02-01", zone: "A", currentProduct: "-", currentQty: 0 },
      { id: "1C-01-01", zone: "B", currentProduct: "-", currentQty: 0 },
      { id: "1C-01-02", zone: "B", currentProduct: "-", currentQty: 0 },
      { id: "1C-02-01", zone: "B", currentProduct: "-", currentQty: 0 },
      { id: "1D-01-01", zone: "C", currentProduct: "-", currentQty: 0 },
      { id: "1D-01-02", zone: "C", currentProduct: "-", currentQty: 0 }
    ];

    let inventoryData = JSON.parse(localStorage.getItem('wms_v2_inventory')) || [...initialInventory];
    let locationMaster = JSON.parse(localStorage.getItem('wms_v2_locations')) || [...initialLocations];

    // 2. 초기화 및 탭 전환
    window.onload = () => {
      lucide.createIcons();
      renderInventoryTable();
      renderWarehouseMap();
      renderLocationMaster();
    };

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab', 'text-indigo-600'));
      document.querySelectorAll('nav button').forEach(el => el.classList.add('text-slate-500'));
      
      document.getElementById(`tab-${tabId}`).classList.add('active');
      document.getElementById(`tab-${tabId}-btn`).classList.add('active-tab', 'text-indigo-600');
      document.getElementById(`tab-${tabId}-btn`).classList.remove('text-slate-500');
    }

    // 3. 현재고 관리 로직
    function renderInventoryTable() {
      const tbody = document.getElementById('inventory-table-body');
      tbody.innerHTML = '';
      inventoryData.forEach((item, index) => {
        tbody.innerHTML += `
          <tr class="hover:bg-slate-50 transition">
            <td class="p-3"><input type="text" value="${item.barcode}" onchange="updateInventory(${index}, 'barcode', this.value)" class="w-full bg-transparent border-none focus:ring-1 focus:ring-indigo-500 rounded px-2 py-1 font-mono text-sm"></td>
            <td class="p-3"><input type="text" value="${item.name}" onchange="updateInventory(${index}, 'name', this.value)" class="w-full bg-transparent border-none focus:ring-1 focus:ring-indigo-500 rounded px-2 py-1 text-sm"></td>
            <td class="p-3"><input type="number" value="${item.qty}" onchange="updateInventory(${index}, 'qty', this.value)" class="w-full bg-transparent border-none focus:ring-1 focus:ring-indigo-500 rounded px-2 py-1 text-sm font-bold"></td>
            <td class="p-3"><input type="text" value="${item.locations}" placeholder="예: 1B-01-01, 1B-01-02" onchange="updateInventory(${index}, 'locations', this.value)" class="w-full bg-transparent border-none focus:ring-1 focus:ring-indigo-500 rounded px-2 py-1 text-sm text-indigo-600 font-semibold"></td>
            <td class="p-3 text-right">
              <button onclick="removeInventoryRow(${index})" class="text-slate-400 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </td>
          </tr>
        `;
      });
      lucide.createIcons();
    }

    function updateInventory(index, field, value) {
      inventoryData[index][field] = (field === 'qty') ? parseInt(value) || 0 : value;
      saveToLocal();
    }

    function addNewInventoryRow() {
      inventoryData.push({ barcode: "", name: "새 품목", qty: 0, locations: "" });
      renderInventoryTable();
    }

    function removeInventoryRow(index) {
      if(confirm("해당 품목 정보를 삭제하시겠습니까?")) {
        inventoryData.splice(index, 1);
        renderInventoryTable();
        saveToLocal();
      }
    }

    // 4. 핵심 엔진: 로케이션 동기화 (Sync)
    function syncAllData() {
      // Step 1: 로케이션 마스터 초기화 (공석 상태로)
      locationMaster.forEach(loc => {
        loc.currentProduct = "-";
        loc.currentQty = 0;
      });

      // Step 2: 현재고 리스트의 다중 로케이션 정보를 바탕으로 매핑
      inventoryData.forEach(item => {
        if (!item.locations) return;
        
        // 콤마로 구분된 로케이션 코드들을 배열로 변환
        const locCodes = item.locations.split(',').map(s => s.trim());
        
        locCodes.forEach(code => {
          const targetLoc = locationMaster.find(l => l.id === code);
          if (targetLoc) {
            targetLoc.currentProduct = item.name;
            // 예시 로직: 다중 로케이션에 수량을 균등 배분하거나, 특정 표시를 남김
            targetLoc.currentQty = 1; // 1은 적재 중 표시
          }
        });
      });

      saveToLocal();
      renderWarehouseMap();
      renderLocationMaster();
      showToast("🔄 현재고 데이터를 기반으로 로케이션 맵이 동기화되었습니다!");
      switchTab('map');
    }

    // 5. 로케이션 맵 렌더링
    function renderWarehouseMap() {
      const grid = document.getElementById('warehouse-map-grid');
      grid.innerHTML = '';
      let occupiedCount = 0;

      locationMaster.forEach(loc => {
        const isOccupied = loc.currentQty > 0;
        if (isOccupied) occupiedCount++;

        grid.innerHTML += `
          <div class="border rounded-xl p-3 h-24 flex flex-col justify-between transition ${isOccupied ? 'bg-indigo-600 border-indigo-700 text-white shadow-md' : 'bg-white border-slate-200 text-slate-400'}">
            <div class="flex justify-between items-start">
              <span class="text-[10px] font-bold uppercase tracking-tighter">${loc.id}</span>
              <span class="text-[9px] px-1.5 py-0.5 rounded bg-black/10">${loc.zone}존</span>
            </div>
            <div class="truncate text-[11px] font-bold">${isOccupied ? loc.currentProduct : 'EMPTY'}</div>
          </div>
        `;
      });

      const rate = Math.round((occupiedCount / locationMaster.length) * 100);
      document.getElementById('map-occupancy-rate').innerText = `${rate}%`;
    }

    // 6. 로케이션 마스터 테이블 렌더링
    function renderLocationMaster() {
      const container = document.getElementById('location-master-container');
      let html = `
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="p-4 text-xs font-bold text-slate-400">로케이션 ID</th>
              <th class="p-4 text-xs font-bold text-slate-400">구역</th>
              <th class="p-4 text-xs font-bold text-slate-400">현재 보관 품목</th>
              <th class="p-4 text-xs font-bold text-slate-400">상태</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
      `;
      
      locationMaster.forEach(loc => {
        html += `
          <tr class="text-sm">
            <td class="p-4 font-bold text-slate-900">${loc.id}</td>
            <td class="p-4 text-slate-500">${loc.zone}구역</td>
            <td class="p-4 font-medium">${loc.currentProduct}</td>
            <td class="p-4">
              <span class="px-2 py-1 rounded-full text-[10px] font-bold ${loc.currentQty > 0 ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-400'}">
                ${loc.currentQty > 0 ? '적재 중' : '공석'}
              </span>
            </td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function saveToLocal() {
      localStorage.setItem('wms_v2_inventory', JSON.stringify(inventoryData));
      localStorage.setItem('wms_v2_locations', JSON.stringify(locationMaster));
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = "fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 text-sm font-bold animate-bounce";
      toast.innerText = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
